<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla dinámica</title>
    <script src="editor-tabla-dinamica.js" defer></script>
</head>
<body>
    <table id="tabla">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>

    <div id="formulario">
        <input id="campo-nombre" type="text" placeholder="Nombre" />
        <input id="campo-apellido" type="text" placeholder="Apellido" />
        <input id="campo-edad" type="number" placeholder="Edad" />
        <button id="btn-añadir-fila">Añadir fila</button>
    </div>
    
    <p id="contador">Total de filas: 0</p>
</body>
</html>
