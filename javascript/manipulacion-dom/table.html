<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Table</title>
</head>
<body>

    <form action="">
        <p>
            <label for="nrows">Introduzca el número de filas:</label>
            <input type="number" name="nrows" id="nrows">
        </p>
        <p>
            <label for="ncols">Introduzca el número de columnas:</label>
            <input type="number" name="ncols" id="ncols">
        </p>
        <button>Crear tabla</button>
    </form>

    <p id="msg"></p>

    <table></table>

    <script>
        const nrowsInput = document.querySelector("#nrows");
        const ncolsInput = document.querySelector("#ncols");
        const button = document.querySelector("button");
        let table = document.querySelector("table");

        button.addEventListener("click", (event) => {
            event.preventDefault();

            let msg = document.querySelector("#msg");

            if (!nrowsInput.value || !ncolsInput.value) {
                msg.textContent = "Debe introducir número de filas y columnas!";
                msg.style.color = "red";
            } else {
                if (msg) {
                    msg.remove();
                } else if (table) {
                    table.remove();
                } 

                const rowsToAdd = nrowsInput.value;
                const colsToAdd = ncolsInput.value;

                table = document.querySelector("table");
                table.style.border = "2px solid";

                for (let i = 0; i < rowsToAdd; i++) {
                    const newRow = document.createElement("tr");
                    table.appendChild(newRow);
                    for (let j = 0; j < colsToAdd; j++) {
                        const tableData = document.createElement("td");
                        const textData = document.createTextNode(`${j}`);
                        newRow.appendChild(tableData);
                        tableData.appendChild(textData);
                    }
                }
            }

            nrowsInput.value = "";
            ncolsInput.value = "";
            nrowsInput.focus();
        })
    </script>
</body>
</html>
