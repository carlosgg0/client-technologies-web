<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const url = "https://mdn.github.io/learning-area/javascript/apis/fetching-data/can-store/products.json";

        const fetchPromise = fetch(url);
        
        fetchPromise
            .then((response) => {
                if (!response.ok)
                    throw new Error(`HTTP error: ${response.status}`);
                
                return response.json();
            })
            .then((products) => {
                products.forEach(p => {
                    console.log(`Producto: ${p.name} | Precio: ${p.price}`);
                });
            })
            .catch((err) => console.error(err.message));
        

        console.log("Refactorización: ");
        
        // Refactorización async & await
        // (más legible por la ausencia de lambdas)
        async function fetchProduct() {
            try {
                const response = await fetch(url);
                if (!response.ok)
                    throw new Error(`HTTP error: ${response.status}`);

                const products = await response.json();
                for (const product of products) {
                    console.log(`Producto: ${product.name} | Precio: ${product.price}`);
                }
            } catch (error) {
                console.error(`Error de red: ${error}`);
            } finally {
                // ¿¿¿???
            }
        }

        fetchProduct();

    </script>
</body>
</html>
