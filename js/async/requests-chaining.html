<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const urlProductos = "https://mdn.github.io/learning-area/javascript/apis/fetching-data/can-store/products.json";
        
        fetch(urlProductos)
            .then((response) => {
                return response.json();
            })
            .then((productos) => {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        resolve({
                            producto: productos[0].name,
                            unidades: Math.floor(Math.random() * 100)
                        });
                    }, 500);
                })
            })
            .then((producto) => {
                console.log(`Nombre: ${producto.producto}, Unidades: ${producto.unidades}`);
            })
            .catch((err) => console.log(err.message));
            
    </script>
</body>
</html>
