<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplicación simple de dibujo</title>
    <script src="app-dibujo.js" defer></script>
    <link href="app-dibujo.css" rel="stylesheet" />
</head>

<body>
    <input type="color" aria-label="select pen color" value="#ff0000" />
    <div>
        <input type="range" min="2" max="50" value="30" aria-label="select pen size" /><span class="output">30</span>
    </div>
    <button>Clear canvas</button>
    </div>

    <canvas class="myCanvas">
        <p>Su navegador no soporta el elemento canvas.</p>
    </canvas>
</body>

</html>
