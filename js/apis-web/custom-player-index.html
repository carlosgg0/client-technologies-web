<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video player example</title>
    <link rel="stylesheet" type="text/css" href="./custom-player-style.css" />
  </head>
  <body>
    <div class="player">
      <video controls>
        <source
          src="./video/coverr-sun-shining-over-the-ocean-2178-480.mp4"
          type="video/mp4" />
        <!-- <source
          src="./shared-assets/videos/coverr-sun-shining-over-the-ocean-2178-480.webm"
          type="video/webm" /> -->
      </video>
      <div class="controls">
        <button
          class="play"
          data-icon="P"
          aria-label="play pause toggle">
        </button>
        <button
          class="stop"
          data-icon="S"
          aria-label="stop">
        </button>
        <div class="timer">
          <div></div>
          <span>00:00</span>
        </div>
        <button
          class="rwd"
          data-icon="B"
          aria-label="rewind">
        </button>
        <button
          class="fwd"
          data-icon="F"
          aria-label="fast forward">
        </button>
      </div>
    </div>
    <p>
      <a href="https://coverr.co/videos/sun-shining-over-the-ocean-piplgoew3c">
        Sun shining over the ocean. Drone shot of the sun shining over the ocean. 
      </a>
    </p>
    <script src="./custom-player.js"></script>
  </body>
</html>
